name: "PLG Deploy"
description: "Build and deploy plg addon to workshop"

inputs:
    workshop-id:
        required: true

runs:
    using: "composite"
    steps:
        - name: Setup python
          uses: actions/setup-python@v5
          with:
            python-version: "3.13"

        - name: Install dependencies
          run: |
            python -m pip install -U pip
            pip install pylovegmod-sdk
          shell: bash
        
        - name: Build from source
          run: |
            plg-sdk build
          shell: bash
        
        - name: Pack build artefact
          run: |
            python pack_build_to_gma.py
          shell: bash
        
        - name: Build steamcmd artefact
          run: |
            python build_steamcmd_artefacts.py
          shell: bash
        
        - name: Cache steamcmd
          uses: actions/cache@v4
          with:
            path: steamcmd
            key: steamcmd-linux-v1
        
        - name: Install steamcmd if missing
          run: |
            if [ ! -f steamcmd/steamcmd.sh ]; then
                mkdir -p steamcmd
                cd steamcmd
                crul -sL TODO: steamurl | tar -xz
            fi
          shell: bash

        - name: Upload
          run: |
            cd steamcmd
            ./steamcmd.sh \
              +login "$STEAM_USER" "$STEAM_PASS" \
              +run_app_build ../steam_upload.txt \
              +quit
          shell: bash
          env:
            STEAM_USER: ${{ secrets.STEAM_USER }}
            STEAM_PASS: ${{ secrets.STEAM_PASS }}
